<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Sweeper</title>

    <style>

        /* Defaults */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            height: 100vh;
            background: linear-gradient(135deg, #2e4f3a, #6f8f72);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Background Decoration */
        body::before,
        body::after {
            position: absolute;
            font-size: 10rem;
            opacity: 0.06;
            pointer-events: none;
        }

        body::before {
            content: "♻️";
            top: 10%;
            left: 10%;
            transform: rotate(-15deg);
        }

        body::after {
            content: "🗑️";
            bottom: 10%;
            right: 10%;
            transform: rotate(12deg);
        }

        .recycle-icon {
            position: absolute;
            top: 18px;
            right: 18px;
            font-size: 2rem;
            opacity: 0.25;
        }

        /* Login & Signup Buttons */
        .auth-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .auth-buttons button {
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background: rgba(46, 79, 58, 0.9);
            transition: 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .auth-buttons button:hover {
            background: #3a6349;
            transform: translateY(-2px);
        }

        /* Main Content */
        .container {
            width: 380px;
            padding: 2.5rem;
            background: #f5efdc;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }

        .container::before {
            content: "♻️";
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 5rem;
            opacity: 0.12;
            transform: rotate(15deg);
        }

        /* Title */
        h1 {
            color: #2e4f3a;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        /* Standard button */
        .main-btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-btn:hover {
            transform: translateY(-3px);
        }

        /* Play button */
        .play-btn {
            background: #2e4f3a;
            color: white;
        }

        .play-btn:hover {
            background: #3a6349;
        }

        /* How2play Button */
        .how-btn {
            background: #5f7f6a;
            color: white;
            opacity: 0.9;
        }

        .how-btn:hover {
            background: #6a8d76;
        }

        /* Leaderboard button */
        .leaderboard-btn {
            background: linear-gradient(135deg, #f5d76e, #d4af37);
            color: #2e2e2e;
            font-weight: 800;

            box-shadow:
                0 0 10px rgba(212, 175, 55, 0.45),
                0 0 25px rgba(212, 175, 55, 0.25);

            position: relative;
            overflow: hidden;
        }

        .leaderboard-btn:hover {
            filter: brightness(1.08);
            transform: translateY(-3px);

            box-shadow:
                0 0 14px rgba(212, 175, 55, 0.65),
                0 0 35px rgba(212, 175, 55, 0.35);
        }

        .leaderboard-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;

            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.5),
                transparent
            );

            transform: skewX(-20deg);
        }

        .leaderboard-btn:hover::before {
            animation: shine 0.9s ease forwards;
        }

        @keyframes shine {
            0% { left: -75%; }
            100% { left: 125%; }
        }

        .leaderboard-space {
            height: 18px;
        }

    </style>
</head>

<body>

    <!-- background decoration -->
    <div class="recycle-icon">♻️</div>

    <!-- login and signup buttons -->
    <div class="auth-buttons">
        <button onclick="location.href='login.html'">Login</button>
        <button onclick="location.href='signup.html'">Sign Up</button>
    </div>

    <!-- main menu -->
    <div class="container">
        <h1>Street Sweeper</h1>

        <button class="main-btn play-btn" onclick="location.href='game.html'">
            Play
        </button>

        <button class="main-btn how-btn" onclick="location.href='howto.html'">
            How to Play
        </button>

        <div class="leaderboard-space"></div>

        <button class="main-btn leaderboard-btn" onclick="location.href='leaderboard.html'">
            🏆 View Leaderboard
        </button>
    </div>

</body>
</html>
