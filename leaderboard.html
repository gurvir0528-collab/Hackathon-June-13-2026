<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                135deg,
                #2e4f3a,
                #6f8f72
            );
        }

        .leaderboard-container {
            width: 420px;
            padding: 2rem;

            background: #f5efdc;
            border-radius: 20px;

            text-align: center;
            position: relative;
            overflow: hidden;

            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }

        .leaderboard-container::before {
            content: "🏆";
            position: absolute;
            top: -15px;
            right: -10px;

            font-size: 5rem;
            opacity: 0.12;
            transform: rotate(15deg);
        }

        .leaderboard-container::after {
            content: "📊";
            position: absolute;
            bottom: -10px;
            left: -10px;

            font-size: 3rem;
            opacity: 0.12;
        }

        h2 {
            color: #2e4f3a;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            font-weight: 700;
        }

        #leaderboard {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            padding: 12px;
            border-radius: 12px;

            background: white;
            border: 2px solid #d8c3a5;

            display: flex;
            justify-content: space-between;
            align-items: center;

            font-size: 1rem;

            transition: 0.2s ease;
        }

        .row:hover {
            transform: translateY(-2px);
            border-color: #6f8f72;
        }

        .rank {
            font-weight: bold;
            color: #2e4f3a;
        }

        .xp {
            font-weight: 600;
            color: #6f8f72;
        }

        /* Back button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;

            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;

            color: white;
            background: rgba(46, 79, 58, 0.9);

            transition: 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .back-btn:hover {
            background: #3a6349;
            transform: translateY(-2px);
        }

        /* Auth buttons (NEW) */
        .auth-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 2;
        }

        .auth-buttons button {
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background: rgba(46, 79, 58, 0.9);
            transition: 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .auth-buttons button:hover {
            background: #3a6349;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- Back button -->
    <button class="back-btn" onclick="location.href='index.html'">
        ← Back
    </button>

    <!-- Auth buttons -->
    <div class="auth-buttons">
        <button onclick="location.href='login.html'">Login</button>
        <button onclick="location.href='signup.html'">Sign Up</button>
    </div>

    <div class="leaderboard-container">

        <h2>Leaderboard</h2>

        <div id="leaderboard"></div>

    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
