<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont,
                         "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;

            padding-top: 90px;
            padding-bottom: 30px;
            gap: 18px;

    		background: linear-gradient(135deg, #2e4f3a, #6f8f72);
		}

        /* TOP BUTTONS */
        .top-left,
        .top-right {
            position: absolute;
            top: 20px;
            z-index: 10;
        }

        .top-left { left: 20px; }
        .top-right { right: 20px; }

        .top-left button,
        .top-right button {
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .back-btn {
            color: white;
            background: rgba(46, 79, 58, 0.9);
        }

        .back-btn:hover {
            background: #3a6349;
            transform: translateY(-2px);
        }

        .leaderboard-btn {
            color: #2e2e2e;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #d4af37);
            box-shadow:
                0 0 10px rgba(212, 175, 55, 0.45),
                0 0 25px rgba(212, 175, 55, 0.25);
            position: relative;
            overflow: hidden;
        }

        .leaderboard-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.7),
                transparent
            );
            transition: left 0.6s ease;
        }

        .leaderboard-btn:hover {
            background: linear-gradient(135deg, #f8e18c, #e5bf4f);
            transform: translateY(-2px) scale(1.03);

            box-shadow:
                0 0 12px rgba(255, 215, 0, 0.8),
                0 0 25px rgba(255, 215, 0, 0.7),
                0 0 45px rgba(255, 215, 0, 0.5),
                0 0 70px rgba(255, 215, 0, 0.3);
        }

        .leaderboard-btn:hover::before {
            left: 150%;
        }

        /* VIDEO CARD */
        .video-container {
            width: 420px;
            background: #f5efdc;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
            overflow: hidden;
            position: relative;
        }

        .video-header {
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2e4f3a;
            background: rgba(111, 143, 114, 0.15);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .video-frame {
            width: 100%;
            height: 260px;
			transform: rotate(270deg);
        }

        .video-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-container::after {
            content: "📷";
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 2.5rem;
            opacity: 0.08;
            transform: rotate(15deg);
        }

        /* INPUT CARD */
        .play-container {
            width: 420px;
            padding: 28px;
            background: #f5efdc;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
            position: relative;
            overflow: hidden;
        }

        .play-container::before {
            content: "♻";
            position: absolute;
            top: -10px;
            right: -8px;
            font-size: 4rem;
            color: #6f8f72;
            opacity: 0.12;
            transform: rotate(15deg);
        }

        .play-container::after {
            content: "🗑";
            position: absolute;
            bottom: -8px;
            left: -8px;
            font-size: 2.5rem;
            opacity: 0.08;
        }

        h2 {
            color: #2e4f3a;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .description {
            color: #8b7155;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #d8c3a5;
            border-radius: 12px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #6f8f72;
        }

        button {
            width: 100%;
            margin-top: 14px;
            padding: 11px;
            border: none;
            border-radius: 12px;
            background: #2e4f3a;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #3a6349;
            transform: translateY(-1px);
        }
        button.leaderboard-btn:hover {
            background: linear-gradient(135deg, #f8e18c, #e5bf4f);
        }
        
        
        .info-box {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(111, 143, 114, 0.12);
            border: 1px solid rgba(111, 143, 114, 0.25);
            border-radius: 12px;
            color: #2e4f3a;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .info-box strong {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <!-- TOP BUTTONS -->
    <div class="top-left">
        <button class="back-btn" onclick="location.href='index.html'">
            ← Back
        </button>
    </div>

    <div class="top-right">
        <button class="leaderboard-btn" onclick="location.href='leaderboard.html'">
            🏆 Leaderboard
        </button>
    </div>

    <!-- VIDEO FEED -->
    <div class="video-container">
        <div class="video-header">Live Camera Feed</div>
        <div class="video-header">
		<a href="https://vdo.ninja/?view=nydjizc" target="_blank">If the live feed isn't working, click here!</a>
        </div>
        <div class="video-frame">
            <iframe
                src="https://vdo.ninja/?view=nydjizc"
                allow="camera; microphone; fullscreen; display-capture">
            </iframe>
        </div>
    </div>

    <!-- INPUT CARD -->
    <div class="play-container">
        <h2>Robot Instructions</h2>

        <p class="description">
            Enter one command at a time.
        </p>

        <input id="playInstructions" placeholder="Ex:
moveForward(10);"></input>
		
        <div class="info-box">
            <strong>Available Commands:</strong>
            moveForward(<i>steps</i>);<br>
            turn(<i>degrees</i>);
        </div>

        <button id="instructionsInput">
            Send Instructions
        </button>

        <p id="message" class="description"></p>
    </div>


    <script type="module" src="app.js"></script>

</body>
</html>
