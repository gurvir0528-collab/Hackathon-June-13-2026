<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        /* Defaults */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                135deg,
                #2e4f3a,
                #6f8f72
            );
        }

        /* Login Form */
        .login-container {
            width: 360px;
            padding: 2rem;

            background: #f5efdc;
            border-radius: 20px;

            text-align: center;
            position: relative;
            overflow: hidden;

            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }

        /* Background Decoration */
        .login-container::before {
            content: "♻";
            position: absolute;
            top: -15px;
            right: -10px;

            font-size: 5rem;
            color: #6f8f72;
            opacity: 0.15;
            transform: rotate(15deg);
        }
        .login-container::after {
            content: "🗑";
            position: absolute;
            bottom: -10px;
            left: -10px;

            font-size: 3rem;
            opacity: 0.12;
        }

        /* Title */
        h1 {
            color: #2e4f3a;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            font-weight: 700;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 1rem;

            border: 2px solid #d8c3a5;
            border-radius: 12px;

            background: white;
            font-size: 1rem;

            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #6f8f72;
            box-shadow: 0 0 0 4px rgba(111, 143, 114, 0.2);
        }

        /* Login Button */
        button {
            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 12px;

            background: #2e4f3a;
            color: white;

            font-size: 1rem;
            font-weight: 600;

            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #3a6349;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

    </style>
</head>

<body>

<!-- Back Button -->
<button
    onclick="location.href='index.html'"
    style="
        position: absolute;
        top: 20px;
        left: 20px;

        padding: 8px 14px;
        font-size: 0.85rem;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 600;

        color: white;
        background: rgba(46, 79, 58, 0.9);

        transition: 0.3s ease;
        box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    "
    onmouseover="this.style.background='#3a6349'; this.style.transform='translateY(-2px)'"
    onmouseout="this.style.background='rgba(46, 79, 58, 0.9)'; this.style.transform='translateY(0)'"
>
    ← Back
</button>

<div class="login-container">

    <h1>Login</h1>

    <input
        id="loginEmail"
        type="email"
        placeholder="Email"
    >

    <input
        id="loginPassword"
        type="password"
        placeholder="Password"
    >

    <button id="loginBtn">
        Login
    </button>

</div>

<!-- external JS logic -->
<script type="module" src="app.js"></script>

</body>
</html>
